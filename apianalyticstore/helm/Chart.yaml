apiVersion: v2
name: apianalyticstore
description: Analytics Store Helm Chart for Kubernetes - Supports Elasticsearch+Kibana or OpenSearch+OpenSearch Dashboards

type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
version: 1.0.0

# This is the version number of the application being deployed.
appVersion: "1.0"

dependencies:
- name: common
  repository: "https://ibm.github.io/webmethods-helm-charts/charts"
  tags:
    - softwareag-common
  version: 1.0.4
- name: prometheus-elasticsearch-exporter
  repository: "https://prometheus-community.github.io/helm-charts"
  tags:
    - prometheus-elasticsearch-exporter
  version: 6.6.0
  condition: prometheus-elasticsearch-exporter.enabled

