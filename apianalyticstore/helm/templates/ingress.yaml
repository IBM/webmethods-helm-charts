{{- if .Values.ingress.enabled }}
{{- $context := . }}
{{- $fullName := include "common.names.fullname" . }}
{{- $ingressPath := .Values.ingress.path | default "/" }}
{{- $ingressPathType := .Values.ingress.pathType | default "Prefix" }}
---
# /*
#  * Copyright (c) 2026 IBM Corporation
#  *
#  * SPDX-License-Identifier: Apache-2.0
#  */
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    {{- with .Values.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if .secretName }}
      secretName: {{ .secretName }}
      {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- $host := .host }}
    {{- if not $host }}
      {{- if eq $context.Values.databaseType "elasticsearch" }}
        {{- $host = printf "%s-kibana.%s" $fullName $context.Values.ingress.defaultDomain }}
      {{- else }}
        {{- $host = printf "%s-dashboards.%s" $fullName $context.Values.ingress.defaultDomain }}
      {{- end }}
    {{- end }}
    - host: {{ $host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default $ingressPathType }}
            backend:
              service:
                {{- if eq $context.Values.databaseType "elasticsearch" }}
                name: {{ include "apianalyticstore.kibanaServiceName" $context }}
                {{- else }}
                name: {{ include "apianalyticstore.opensearchDashboardsServiceName" $context }}
                {{- end }}
                port:
                  {{- if eq $context.Values.databaseType "elasticsearch" }}
                  number: {{ $context.Values.kibana.port | default 5601 }}
                  {{- else }}
                  number: {{ $context.Values.opensearchDashboards.port | default 5601 }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}

