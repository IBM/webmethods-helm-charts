# Example values.yaml for deploying analytics store with pre-configured dashboards
# This demonstrates using extraConfigMaps to deploy dashboards directly from values

databaseType: elasticsearch

elasticsearch:
  deploy: true
  version: 8.2.3
  storage: "10Gi"

kibana:
  count: 1
  # Mount the dashboard ConfigMap
  extraVolumes:
    - name: dashboards
      configMap:
        name: "{{ include \"common.names.fullname\" . }}-kibana-dashboards"
  extraVolumeMounts:
    - name: dashboards
      mountPath: /usr/share/kibana/data/dashboards
      readOnly: true

ingress:
  enabled: true
  defaultDomain: "example.com"

# Create ConfigMaps with dashboard definitions
extraConfigMaps:
  - name: "{{ include \"common.names.fullname\" . }}-kibana-dashboards"
    labels:
      app: kibana
      type: dashboards
